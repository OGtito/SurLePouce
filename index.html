<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SurLePouce</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1D9E75;--green-dark:#085041;
  --amber:#BA7517;--amber-light:#FAEEDA;
  --coral:#D85A30;--coral-light:#FAECE7;
  --blue:#185FA5;--blue-light:#E6F1FB;
  --surface-0:#f5f5f5;--surface-1:#ebebeb;--surface-2:#ffffff;
  --text-primary:#1a1a1a;--text-secondary:#666;--text-muted:#999;
  --border:#e0e0e0;--border-strong:#ccc;
  --radius:8px;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--surface-0);color:var(--text-primary);min-height:100vh}
#auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center}
#auth-screen h1{font-size:2.5rem;font-weight:700;color:var(--green);margin-bottom:.5rem}
#auth-screen p{color:var(--text-secondary);margin-bottom:2rem;font-size:1.1rem}
.btn-google{display:flex;align-items:center;gap:12px;padding:12px 24px;border:1px solid var(--border-strong);border-radius:var(--radius);background:white;cursor:pointer;font-size:16px;font-family:inherit;transition:all .15s}
.btn-google:hover{background:var(--surface-1)}
.btn-google img{width:24px;height:24px}
#app{display:none;max-width:720px;margin:0 auto;padding:0 0 80px}
.app-header{background:white;border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.app-header h1{font-size:1.4rem;font-weight:700;color:var(--green)}
.user-avatar{width:32px;height:32px;border-radius:50%;border:2px solid var(--green)}
.btn-signout{font-size:12px;color:var(--text-muted);background:none;border:none;cursor:pointer;padding:4px 8px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--border);display:flex;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;cursor:pointer;color:var(--text-muted);font-size:11px;gap:3px;border:none;background:none;font-family:inherit;transition:color .15s}
.nav-item i{font-size:22px}
.nav-item.active{color:var(--green)}
.section{display:none;padding:16px}
.section.active{display:block}
.card{background:white;border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
h2{font-size:18px;font-weight:600;margin-bottom:16px}
h3{font-size:15px;font-weight:600;margin-bottom:8px}
.btn{padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border-strong);background:white;color:var(--text-primary);cursor:pointer;font-size:14px;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--surface-1)}
.btn-primary{background:#E1F5EE;border-color:#5DCAA5;color:var(--green-dark)}
.btn-primary:hover{background:#9FE1CB}
.btn-danger{color:var(--coral);border-color:var(--coral-light)}
.btn-warning{color:var(--amber);border-color:var(--amber-light)}
.btn-sm{padding:5px 10px;font-size:13px}
.btn-full{width:100%;justify-content:center;padding:12px}
label{font-size:13px;color:var(--text-secondary);display:block;margin-bottom:4px;margin-top:10px}
label:first-child{margin-top:0}
input[type=text],select,textarea{width:100%;padding:8px 10px;border:1px solid var(--border-strong);border-radius:var(--radius);background:white;color:var(--text-primary);font-family:inherit;font-size:14px}
textarea{min-height:70px;resize:vertical}
.flex{display:flex;gap:8px;align-items:center}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.flex-end{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:500}
.tag-rapide{background:#FAEEDA;color:#BA7517}
.tag-normal{background:#E1F5EE;color:#085041}
.tag-decouvert{background:#E6F1FB;color:#185FA5}
.plat-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.plat-row:last-child{border-bottom:none}
.plat-info{flex:1;min-width:0}
.plat-nom{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.plat-meta{font-size:12px;color:var(--text-muted);margin-top:2px}
.plat-profils{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}
.tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.tab{padding:5px 12px;border-radius:20px;border:1px solid var(--border);font-size:13px;cursor:pointer;font-family:inherit;background:white;color:var(--text-secondary);white-space:nowrap;flex-shrink:0}
.tab.active{background:#E1F5EE;border-color:#5DCAA5;color:var(--green-dark)}
.badge{background:#E1F5EE;color:var(--green-dark);border-radius:20px;font-size:11px;padding:1px 6px;margin-left:4px}
.semaine-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.semaine-label{flex:1;text-align:center;font-size:14px;font-weight:600}

/* PLANNING NOUVEAU */
.planning-jour{background:white;border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:visible}
.planning-jour-header{border-radius:12px 12px 0 0}
.planning-jour-header{background:var(--surface-1);padding:8px 12px;font-weight:600;font-size:14px}
.planning-creneau{padding:8px 10px;border-bottom:1px solid var(--border)}
.planning-creneau:last-child{border-bottom:none}
.planning-creneau-label{font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.planning-ligne{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.planning-ligne:last-child{margin-bottom:0}
.planning-profil-sel{flex:0 0 auto;min-width:0;position:relative}
.profil-btn{padding:4px 8px;font-size:12px;border:1px solid var(--border);border-radius:6px;background:white;cursor:pointer;display:flex;align-items:center;gap:4px;max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-secondary)}
.profil-btn.has-sel{border-color:#5DCAA5;background:#E1F5EE;color:var(--green-dark)}
.profil-popup{position:absolute;top:calc(100% + 4px);left:0;z-index:300;background:white;border:1px solid var(--border-strong);border-radius:10px;padding:8px;display:none;flex-direction:column;gap:5px;box-shadow:0 4px 16px rgba(0,0,0,.12);min-width:150px}
.profil-popup.open{display:flex}
.profil-badge-opt{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;border:1.5px solid transparent;transition:all .1s;white-space:nowrap}
.profil-badge-opt.sel{border-width:1.5px}
.planning-plat-sel{flex:1;min-width:0}
.planning-plat-sel select{padding:4px 6px;font-size:12px;border:1px solid var(--border);border-radius:6px;width:100%}
.planning-ligne-btns{display:flex;gap:4px;flex-shrink:0}
.btn-icon{padding:4px 7px;font-size:13px;border-radius:6px;border:1px solid var(--border);background:white;cursor:pointer;display:inline-flex;align-items:center;color:var(--text-secondary)}
.btn-icon:hover{background:var(--surface-1)}
.btn-icon.add{color:var(--green);border-color:#5DCAA5}
.btn-icon.del{color:var(--coral);border-color:var(--coral-light)}
.reste-badge{font-size:10px;background:#FEF3C7;color:#92400E;padding:1px 5px;border-radius:10px;margin-left:4px;font-weight:500}

.rayon-titre{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.checklist-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px}
.checklist-item:last-child{border-bottom:none}
.checklist-item input[type=checkbox]{width:20px;height:20px;cursor:pointer;accent-color:var(--green);flex-shrink:0}
.checklist-item.done span{text-decoration:line-through;color:var(--text-muted)}
.ia-zone{background:var(--surface-1);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:12px}
.ia-reponse{font-size:14px;line-height:1.8;white-space:pre-wrap}
.loading-dots::after{content:'...';animation:dots 1.5s infinite}
@keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}
.profil-card{background:white;border:2px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.profil-color-box{width:44px;height:44px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px}
.profil-nom{font-weight:600;font-size:15px}
.profil-details{font-size:12px;color:var(--text-muted);margin-top:2px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.toggle-row:last-child{border-bottom:none}
.toggle{position:relative;width:42px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;border-radius:12px;background:var(--border-strong);cursor:pointer;transition:.2s}
.toggle input:checked+.toggle-slider{background:var(--green)}
.toggle-slider:before{content:'';position:absolute;
